<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <script>
        const _token = localStorage.getItem('token');
        if (!_token) {
            window.location.replace('/login.html?returnUrl=/admin-classes.html');
        } else {
            try {
                const _payload = JSON.parse(atob(_token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                const _now = Math.floor(Date.now() / 1000);
                if (_payload.exp < _now || _payload.role !== 'admin') {
                    localStorage.removeItem('token');
                    window.location.replace('/login.html');
                }
            } catch {
                localStorage.removeItem('token');
                window.location.replace('/login.html');
            }
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการคลาสเรียน - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">

    <!-- Admin Top Navbar -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top shadow-sm" style="height: 70px;">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="admin-dashboard.html">
                <i class="bi bi-shield-lock-fill text-warning me-2"></i>Admin Panel
            </a>
            <button class="navbar-toggler border-0 d-md-none" type="button"
                onclick="document.getElementById('sidebar').classList.toggle('show')">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="d-none d-md-flex align-items-center text-white">
                <span class="status-indicator"></span> ระบบออนไลน์ (Admin Mode)
                <div class="dropdown ms-3">
                    <a class="text-white text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=30&q=80"
                            alt="Admin" class="rounded-circle me-1" width="30" height="30">
                        <span data-user-name>Admin</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="index.html"><i
                                    class="bi bi-box-arrow-up-right me-2"></i>ไปที่หน้านักเรียน</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="handleLogout()"><i
                                    class="bi bi-box-arrow-right me-2"></i>ออกจากระบบ</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="admin-sidebar shadow-sm" id="sidebar">
        <div class="px-3 mb-4 text-muted small fw-bold text-uppercase">เมนูหลัก</div>
        <a href="admin-dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i> ภาพรวมระบบ</a>
        <a href="admin-classes.html" class="active"><i class="bi bi-journal-text me-2"></i> จัดการคลาสเรียน</a>
        <a href="admin-bookings.html"><i class="bi bi-people-fill me-2"></i> รายชื่อผู้จอง</a>
    </div>

    <!-- Main Content -->
    <div class="admin-content fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">จัดการคลาสเรียน</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#classModal">
                <i class="bi bi-plus-lg me-1"></i> เพิ่มคลาสใหม่
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">ชื่อคลาสเรียน</th>
                                <th class="py-3">ผู้สอน</th>
                                <th class="py-3">วัน-เวลา</th>
                                <th class="py-3">ปรับที่นั่งด่วน (Real-time)</th>
                                <th class="py-3">ราคา</th>
                                <th class="py-3">สถานะ</th>
                                <th class="px-4 py-3 text-end">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="admin-classes-tbody">
                            <tr>
                                <td colspan="7" class="text-center py-4 text-muted">กำลังโหลด...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Class Modal -->
    <div class="modal fade" id="classModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">เพิ่ม / แก้ไข คลาสเรียน</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="classForm" onsubmit="return false;">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label small fw-bold">ชื่อคลาสเรียน</label>
                                <input type="text" class="form-control" id="classFormTitle"
                                    placeholder="เช่น Web Development 101" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">หมวดหมู่</label>
                                <select class="form-select" id="classFormCategory">
                                    <option value="Programming">Programming</option>
                                    <option value="Design">Design</option>
                                    <option value="Data Science">Data Science</option>
                                    <option value="Marketing">Marketing</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">ชื่อผู้สอน</label>
                                <input type="text" class="form-control" id="classFormInstructor"
                                    placeholder="ชื่อวิทยากร" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">วันและเวลาที่เรียน</label>
                                <input type="datetime-local" class="form-control" id="classFormDatetime">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold">จำนวนที่นั่งสูงสุด</label>
                                <input type="number" class="form-control" id="classFormCapacity" value="30" min="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">ราคา (บาท)</label>
                                <input type="number" class="form-control" id="classFormPrice" min="0" placeholder="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">สถานะ</label>
                                <select class="form-select" id="classFormStatus">
                                    <option value="open">เปิดรับสมัคร</option>
                                    <option value="closed">ปิดรับสมัคร</option>
                                </select>
                            </div>
                            <input type="hidden" id="classFormDate">
                            <input type="hidden" id="classFormTimeStart" value="09:00">
                            <input type="hidden" id="classFormTimeEnd" value="17:00">

                            <div class="col-12">
                                <label class="form-label small fw-bold">URL รูปคลาส</label>
                                <input type="url" class="form-control" id="classFormImageUrl" placeholder="https://...">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">รายละเอียด</label>
                                <textarea class="form-control" id="classFormDescription" rows="4"
                                    placeholder="กรอกรายละเอียด..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0 pb-4 px-4">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn btn-primary-custom" id="admin-class-save-btn">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container is generated by main.js -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin.js"></script>
</body>

</html>
