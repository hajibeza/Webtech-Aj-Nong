<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจองคลาสเรียนออนไลน์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5 col-lg-4 fade-in">
            <div class="card glass-card border-0 p-4 shadow">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="bi bi-calendar-check me-2"></i>จองคลาส.com</h2>
                    <p class="text-muted">ยินดีต้อนรับกลับมา, กรุณาเข้าสู่ระบบ</p>
                </div>

                <div id="loginAlert" class="alert d-none" role="alert"></div>

                <form id="loginForm" autocomplete="on" novalidate>
                    <div class="mb-3">
                        <label class="form-label text-muted small" for="email">อีเมล</label>
                        <input type="email" id="email" class="form-control p-2"
                               placeholder="student@example.com" autocomplete="email" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small" for="password">รหัสผ่าน</label>
                        <input type="password" id="password" class="form-control p-2"
                               placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100">
                        เข้าสู่ระบบ
                    </button>
                </form>

                <div class="text-center mt-3">
                    <span class="small text-muted">ยังไม่มีบัญชี? </span>
                    <a href="register.html" class="text-decoration-none small fw-bold text-primary">สมัครสมาชิก</a>
                </div>

                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none small text-muted">
                        <i class="bi bi-arrow-left"></i> กลับหน้าหลัก
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        const API_BASE_URL = typeof getApiBaseUrl === 'function'
            ? getApiBaseUrl()
            : 'http://localhost:3000';

        // Remove credentials if they were leaked into the URL by a native form GET submit
        (function cleanLoginUrl() {
            const params = new URLSearchParams(window.location.search);
            if (!params.has('email') && !params.has('password')) return;
            const returnUrl = params.get('returnUrl');
            const clean = returnUrl
                ? `login.html?returnUrl=${encodeURIComponent(returnUrl)}`
                : 'login.html';
            window.history.replaceState({}, '', clean);
        })();

        const DEFAULT_USER_URL = '/index.html';
        const DEFAULT_ADMIN_URL = '/admin.html';

        function getSafeReturnUrl(raw, fallback) {
            if (!raw) return fallback;
            const trimmed = raw.trim();
            const lower = trimmed.toLowerCase();
            if (lower.startsWith('http://') || lower.startsWith('https://') || lower.startsWith('//')) {
                return fallback;
            }
            if (trimmed.startsWith('/') && !trimmed.startsWith('//')) {
                return trimmed;
            }
            return fallback;
        }

        // ฟังก์ชันช่วยแสดงกล่องข้อความแจ้งเตือนสีแดง/สีส้มบนหน้าจอเมื่อล็อกอินไม่สำเร็จ
        function showLoginAlert(message, type) {
            const alertEl = document.getElementById('loginAlert');
            alertEl.className = `alert alert-${type}`; // สลับคลาสสีแจ้งเตือน (เช่น alert-danger / alert-warning)
            alertEl.textContent = message; // พิมพ์ข้อความคำเตือน
            alertEl.classList.remove('d-none'); // ดึงคลาสซ่อนออกเพื่อให้มองเห็นกล่องเตือน
        }

        async function doLogin() {
            if (typeof saveAuthSession !== 'function') {
                showLoginAlert('ไม่สามารถโหลดระบบยืนยันตัวตนได้ กรุณารีเฟรชหน้า', 'danger');
                return;
            }

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    showLoginAlert(result.message || 'เข้าสู่ระบบไม่สำเร็จ', 'danger');
                    return;
                }

                const { token, user } = result.data;
                saveAuthSession(token, user);

                const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                const role = payload.role || user.role;
                const params = new URLSearchParams(window.location.search);
                const returnUrl = params.get('returnUrl');

                if (role === 'admin') {
                    const adminDest = returnUrl && returnUrl.includes('admin') ? returnUrl : '/admin.html';
                    window.location.href = adminDest;
                    return;
                }

                window.location.href = getSafeReturnUrl(returnUrl, DEFAULT_USER_URL);
            } catch (error) {
                console.error('Login error:', error);
                showLoginAlert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'danger');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            doLogin();
        });
    </script>
</body>
</html>
