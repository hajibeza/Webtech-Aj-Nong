<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจองคลาสเรียนออนไลน์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5 col-lg-4 fade-in">
            <div class="card glass-card border-0 p-4 shadow">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="bi bi-calendar-check me-2"></i>จองคลาส.com</h2>
                    <p class="text-muted">ยินดีต้อนรับกลับมา, กรุณาเข้าสู่ระบบ</p>
                </div>

                <div id="loginAlert" class="alert d-none" role="alert"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small" for="email">อีเมล</label>
                        <input type="email" id="email" name="email" class="form-control p-2"
                               placeholder="student@example.com" value="student@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small" for="password">รหัสผ่าน</label>
                        <input type="password" id="password" name="password" class="form-control p-2"
                               placeholder="••••••••" value="password123" required>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 mb-3" data-role="user">
                        เข้าสู่ระบบ (นักเรียน)
                    </button>
                    <button type="button" id="adminLoginBtn" class="btn btn-outline-secondary w-100">
                        เข้าสู่ระบบ (แอดมิน)
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none small text-muted">
                        <i class="bi bi-arrow-left"></i> กลับหน้าหลัก
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // API Base URL สำหรับใช้เรียกเข้า API ยืนยันสิทธิ์หลังบ้าน
        const API_BASE_URL = 'http://localhost:3000';

        const DEFAULT_USER_URL = '/index.html';
        const DEFAULT_ADMIN_URL = '/admin-dashboard.html';

        function getSafeReturnUrl(raw, fallback) {
            if (!raw) return fallback;
            const trimmed = raw.trim();
            const lower = trimmed.toLowerCase();
            if (lower.startsWith('http://') || lower.startsWith('https://') || lower.startsWith('//')) {
                return fallback;
            }
            if (trimmed.startsWith('/') && !trimmed.startsWith('//')) {
                return trimmed;
            }
            return fallback;
        }

        function getPostLoginRedirect(expectedRole, userRole) {
            const params = new URLSearchParams(window.location.search);
            const fallback = userRole === 'admin' ? DEFAULT_ADMIN_URL : DEFAULT_USER_URL;
            if (expectedRole === 'admin') {
                return DEFAULT_ADMIN_URL;
            }
            return getSafeReturnUrl(params.get('returnUrl'), fallback);
        }

        // ฟังก์ชันช่วยแสดงกล่องข้อความแจ้งเตือนสีแดง/สีส้มบนหน้าจอเมื่อล็อกอินไม่สำเร็จ
        function showLoginAlert(message, type) {
            const alertEl = document.getElementById('loginAlert');
            alertEl.className = `alert alert-${type}`; // สลับคลาสสีแจ้งเตือน (เช่น alert-danger / alert-warning)
            alertEl.textContent = message; // พิมพ์ข้อความคำเตือน
            alertEl.classList.remove('d-none'); // ดึงคลาสซ่อนออกเพื่อให้มองเห็นกล่องเตือน
        }

        // ฟังก์ชันประมวลผลการล็อกอิน ยิงตรวจสอบข้อมูลกับเซิร์ฟเวอร์
        async function doLogin(expectedRole) {
            const email = document.getElementById('email').value.trim(); // อ่านค่าอีเมลที่กรอกและตัดช่องว่าง
            const password = document.getElementById('password').value; // อ่านค่ารหัสผ่านที่กรอก

            try {
                // ยิง API แบบ POST ไปยังเซิร์ฟเวอร์ที่เส้นล็อกอิน
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }), // แนบชุดข้อมูลเมลและรหัสส่งไป
                });

                // แปลงผลการตอบกลับจากเซิร์ฟเวอร์เป็น JSON Object
                const result = await response.json();

                if (!response.ok || !result.success) {
                    // หากตอบกลับสถานะไม่สำเร็จ ให้เปิดการแจ้งเตือนสีแดงบอกผู้ใช้
                    showLoginAlert(result.message || 'เข้าสู่ระบบไม่สำเร็จ', 'danger');
                    return;
                }

                // ดึง JWT Token และข้อมูลโปรไฟล์สิทธิ์ของผู้ใช้ที่หลังบ้านตอบกลับมา
                const { token, user } = result.data;

                // ตรวจเช็ค หากคลิกปุ่มแอดมินแต่สิทธิ์ในฐานข้อมูลไม่ใช่แอดมิน ให้ปฏิเสธการเข้าล็อกอิน
                if (expectedRole === 'admin' && user.role !== 'admin') {
                    showLoginAlert('บัญชีนี้ไม่มีสิทธิ์แอดมิน', 'warning');
                    return;
                }

                // บันทึก JWT Token และค่าข้อมูล session ลงใน localStorage เพื่อใช้ยืนยันตัวตนใน API เส้นอื่นๆ
                localStorage.setItem('token', token); // เก็บ Token สำหรับส่งแนบไปใน API Headers
                localStorage.setItem('isLoggedIn', 'true'); // เซ็ตค่าสถานะเข้าสู่ระบบสำเร็จ
                localStorage.setItem('userId', String(user.id)); // เซ็ตบันทึกรหัสประจำตัวผู้ใช้
                localStorage.setItem('userName', user.name);

                if (user.role === 'admin') {
                    localStorage.setItem('isAdmin', 'true');
                } else {
                    localStorage.removeItem('isAdmin');
                }

                window.location.href = getPostLoginRedirect(expectedRole, user.role);
            } catch (error) {
                console.error('Login error:', error);
                showLoginAlert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'danger');
            }
        }

        // ตัวดักฟัง Event เมื่อกดยื่นฟอร์มข้อมูลนักเรียน (Submit)
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault(); // ป้องกันหน้าเพจรีเฟรชตัวเองตามกลไกฟอร์มปกติ
            doLogin('user'); // ดำเนินการล็อกอินสิทธิ์นักเรียนทั่วไป
        });

        // ตัวดักฟัง Event เมื่อผู้ใช้คลิกปุ่มล็อกอินประเภทผู้ดูแลระบบ (Admin)
        document.getElementById('adminLoginBtn').addEventListener('click', () => {
            // กรอกค่าอีเมลและรหัสแอดมินจำลองลงใน Input โดยอัตโนมัติเพื่ออำนวยความสะดวก
            document.getElementById('email').value = 'admin@example.com';
            document.getElementById('password').value = 'admin123';
            doLogin('admin'); // ดำเนินการล็อกอินสิทธิ์แอดมินระบบ
        });
    </script>
</body>
</html>
