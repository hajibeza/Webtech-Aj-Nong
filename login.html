<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจองคลาสเรียนออนไลน์</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5 col-lg-4 fade-in">
            <div class="card glass-card border-0 p-4 shadow">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="bi bi-calendar-check me-2"></i>จองคลาส.com</h2>
                    <p class="text-muted">ยินดีต้อนรับกลับมา, กรุณาเข้าสู่ระบบ</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small">อีเมล</label>
                        <input type="email" class="form-control p-2" placeholder="student@example.com" value="student@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small">รหัสผ่าน</label>
                        <input type="password" class="form-control p-2" placeholder="••••••••" value="password123" required>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 mb-3" onclick="login(false)">เข้าสู่ระบบ (นักเรียน)</button>
                    <button type="button" class="btn btn-outline-secondary w-100" onclick="login(true)">เข้าสู่ระบบ (แอดมิน)</button>
                </form>

                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none small text-muted"><i class="bi bi-arrow-left"></i> กลับหน้าหลัก</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function login(isAdminRole) {
            event.preventDefault();
            localStorage.setItem('isLoggedIn', 'true');
            if (isAdminRole) {
                localStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                localStorage.removeItem('isAdmin');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
