<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin ระบบจองคลาส</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <!-- Admin Top Navbar -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top shadow-sm" style="height: 70px;">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="admin-dashboard.html">
                <i class="bi bi-shield-lock-fill text-warning me-2"></i>Admin Panel
            </a>
            <button class="navbar-toggler border-0 d-md-none" type="button" onclick="document.getElementById('sidebar').classList.toggle('show')">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="d-none d-md-flex align-items-center text-white">
                <span class="status-indicator"></span> ระบบออนไลน์ (Admin Mode)
                <div class="dropdown ms-3">
                    <a class="text-white text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=30&q=80" alt="Admin" class="rounded-circle me-1" width="30" height="30">
                        Admin 01
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="index.html"><i class="bi bi-box-arrow-up-right me-2"></i>ไปที่หน้านักเรียน</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="handleLogout()"><i class="bi bi-box-arrow-right me-2"></i>ออกจากระบบ</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="admin-sidebar shadow-sm" id="sidebar">
        <div class="px-3 mb-4 text-muted small fw-bold text-uppercase">เมนูหลัก</div>
        <a href="admin-dashboard.html" class="active"><i class="bi bi-grid-1x2-fill me-2"></i> ภาพรวมระบบ</a>
        <a href="admin-classes.html"><i class="bi bi-journal-text me-2"></i> จัดการคลาสเรียน</a>
        <a href="admin-bookings.html"><i class="bi bi-people-fill me-2"></i> รายชื่อผู้จอง</a>
        
        <div class="px-3 mt-4 mb-2 text-muted small fw-bold text-uppercase">อื่นๆ</div>
        <a href="#"><i class="bi bi-gear-fill me-2"></i> ตั้งค่าระบบ</a>
    </div>

    <!-- Main Content -->
    <div class="admin-content fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">ภาพรวมระบบ (Dashboard)</h2>
            <button type="button" class="btn btn-outline-primary btn-sm" id="admin-refresh-btn"><i class="bi bi-arrow-clockwise"></i> รีเฟรชข้อมูล</button>
        </div>

        <!-- KPI Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 p-3" style="border-left: 5px solid var(--primary-color) !important;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="text-muted fw-bold mb-0">จำนวนคลาสเรียนทั้งหมด</h6>
                            <div class="p-2 bg-primary-subtle text-primary rounded-3"><i class="bi bi-journal-check fs-5"></i></div>
                        </div>
                        <h2 class="fw-bold mb-0"><span id="admin-kpi-classes">0</span> <span class="fs-6 text-muted fw-normal">คลาส</span></h2>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 p-3" style="border-left: 5px solid var(--secondary-color) !important;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="text-muted fw-bold mb-0">ยอดรายได้รวม</h6>
                            <div class="p-2 bg-success-subtle text-success rounded-3"><i class="bi bi-cash-stack fs-5"></i></div>
                        </div>
                        <h2 class="fw-bold text-success mb-0" id="admin-kpi-revenue">฿0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 p-3" style="border-left: 5px solid #F59E0B !important;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="text-muted fw-bold mb-0">ที่นั่งที่ถูกจองไปแล้ว</h6>
                            <div class="p-2 bg-warning-subtle text-warning rounded-3"><i class="bi bi-person-check-fill fs-5"></i></div>
                        </div>
                        <h2 class="fw-bold mb-0" id="admin-kpi-seats">0 <span class="fs-5 text-muted fw-normal">/ 0 ที่นั่ง</span></h2>
                        <div class="progress mt-2" style="height: 6px;">
                            <div class="progress-bar bg-warning" id="admin-kpi-progress" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart -->
        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4">สถิติการจองคลาสเรียน (วันนี้)</h5>
                    <div style="height: 350px;">
                        <canvas id="bookingChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
