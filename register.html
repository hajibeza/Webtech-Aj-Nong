<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ระบบจองคลาสเรียนออนไลน์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5 col-lg-4 fade-in">
            <div class="card glass-card border-0 p-4 shadow">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="bi bi-calendar-check me-2"></i>จองคลาส.com</h2>
                    <p class="text-muted">สร้างบัญชีผู้ใช้งานใหม่เพื่อเข้าเรียนออนไลน์</p>
                </div>

                <div id="registerAlert" class="alert d-none" role="alert"></div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small" for="name">ชื่อ-นามสกุล</label>
                        <input type="text" id="name" name="name" class="form-control p-2"
                               placeholder="สมชาย รักเรียน" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small" for="email">อีเมล</label>
                        <input type="email" id="email" name="email" class="form-control p-2"
                               placeholder="student@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small" for="password">รหัสผ่าน</label>
                        <input type="password" id="password" name="password" class="form-control p-2"
                               placeholder="••••••••" required>
                        <div class="form-text small text-muted-custom mt-1" style="font-size: 0.75rem; line-height: 1.2;">
                            * รหัสผ่านต้องมีความยาวอย่างน้อย 8 ตัวอักษร, ประกอบด้วยตัวอักษรพิมพ์ใหญ่ (A-Z) อย่างน้อย 1 ตัว และอักขระพิเศษอย่างน้อย 1 ตัว (!@#$%^&*)
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                        สมัครสมาชิก
                    </button>
                </form>

                <div class="text-center mt-2">
                    <span class="small text-muted">มีบัญชีผู้ใช้แล้ว? </span>
                    <a href="login.html" class="text-decoration-none small fw-bold text-primary">เข้าสู่ระบบ</a>
                </div>

                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none small text-muted">
                        <i class="bi bi-arrow-left"></i> กลับหน้าหลัก
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        const API_BASE_URL = typeof getApiBaseUrl === 'function'
            ? getApiBaseUrl()
            : 'http://localhost:3000';

        function showAlert(message, type) {
            const alertEl = document.getElementById('registerAlert');
            alertEl.className = `alert alert-${type}`;
            alertEl.textContent = message;
            alertEl.classList.remove('d-none');
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // ตรวจสอบเงื่อนไขรหัสผ่าน (Password Complexity Validation)
            if (password.length < 8) {
                showAlert('รหัสผ่านต้องมีความยาวอย่างน้อย 8 ตัวอักษร', 'danger');
                return;
            }
            if (!/[A-Z]/.test(password)) {
                showAlert('รหัสผ่านต้องมีตัวอักษรพิมพ์ใหญ่ (A-Z) อย่างน้อย 1 ตัว', 'danger');
                return;
            }
            if (!/[!@#$%^&*]/.test(password)) {
                showAlert('รหัสผ่านต้องมีอักขระพิเศษอย่างน้อย 1 ตัว (เช่น !, @, #, $, %, ^, &, *)', 'danger');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: 'user' }),
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    showAlert(result.message || 'สมัครสมาชิกไม่สำเร็จ', 'danger');
                    return;
                }

                showAlert('สมัครสมาชิกสำเร็จแล้ว! กำลังพาท่านไปหน้าเข้าสู่ระบบ...', 'success');
                
                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showAlert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'danger');
            }
        });
    </script>
</body>
</html>
