<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <script>
        const _token = localStorage.getItem('token');
        if (!_token) {
            window.location.replace('/login.html?returnUrl=/admin-bookings.html');
        } else {
            try {
                const _payload = JSON.parse(atob(_token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                const _now = Math.floor(Date.now() / 1000);
                if (_payload.exp < _now || _payload.role !== 'admin') {
                    localStorage.removeItem('token');
                    window.location.replace('/login.html');
                }
            } catch {
                localStorage.removeItem('token');
                window.location.replace('/login.html');
            }
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายชื่อผู้จอง - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">

    <!-- Admin Top Navbar -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top shadow-sm" style="height: 70px;">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="admin-dashboard.html">
                <i class="bi bi-shield-lock-fill text-warning me-2"></i>Admin Panel
            </a>
            <button class="navbar-toggler border-0 d-md-none" type="button"
                onclick="document.getElementById('sidebar').classList.toggle('show')">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="d-none d-md-flex align-items-center text-white">
                <span class="status-indicator"></span> ระบบออนไลน์ (Admin Mode)
                <div class="dropdown ms-3">
                    <a class="text-white text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=30&q=80"
                            alt="Admin" class="rounded-circle me-1" width="30" height="30">
                        <span data-user-name>Admin</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="index.html"><i
                                    class="bi bi-box-arrow-up-right me-2"></i>ไปที่หน้านักเรียน</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="handleLogout()"><i
                                    class="bi bi-box-arrow-right me-2"></i>ออกจากระบบ</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="admin-sidebar shadow-sm" id="sidebar">
        <div class="px-3 mb-4 text-muted small fw-bold text-uppercase">เมนูหลัก</div>
        <a href="admin-dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i> ภาพรวมระบบ</a>
        <a href="admin-classes.html"><i class="bi bi-journal-text me-2"></i> จัดการคลาสเรียน</a>
        <a href="admin-bookings.html" class="active"><i class="bi bi-people-fill me-2"></i> รายชื่อผู้จอง</a>
    </div>

    <!-- Main Content -->
    <div class="admin-content fade-in">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-3 mb-md-0">รายชื่อผู้จอง (Bookings)</h2>
            <div class="d-flex gap-2">
                <input type="text" class="form-control" placeholder="ค้นหาชื่อนักเรียน...">
                <select class="form-select w-auto">
                    <option value="">ทุกสถานะ</option>
                    <option value="success">สำเร็จแล้ว</option>
                    <option value="pending">รอชำระเงิน</option>
                    <option value="cancelled">ยกเลิกแล้ว</option>
                </select>
                <button class="btn btn-primary"><i class="bi bi-search"></i></button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">รหัสจอง</th>
                                <th class="py-3">ชื่อนักเรียน</th>
                                <th class="py-3">คลาสที่จอง</th>
                                <th class="py-3">วันที่จอง</th>
                                <th class="py-3">ยอดเงิน (บาท)</th>
                                <th class="py-3">สถานะ</th>
                                <th class="px-4 py-3 text-end">จัดการตั๋วหลุด (Force Release)</th>
                            </tr>
                        </thead>
                        <tbody id="admin-bookings-tbody">
                            <tr>
                                <td colspan="7" class="text-center py-4 text-muted">กำลังโหลด...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container is generated by main.js -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin.js"></script>
</body>

</html>
